version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: kshemyatra_postgres
    environment:
      POSTGRES_DB: kshemyatra
      POSTGRES_USER: kshem_admin
      POSTGRES_PASSWORD: kshem_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kshemyatra_redis
    ports:
      - "6379:6379"

  mqtt:
    image: eclipse-mosquitto:2
    container_name: kshemyatra_mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  pgdata: